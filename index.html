<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Inter:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
</head>
<body>
    <div id="particles-container"></div>
    
    <div class="container">
        <!-- Envelope Wrapper -->
        <div class="envelope-wrapper" id="envelopeWrapper">
            <div class="envelope">
                <div class="envelope-bg"></div>
                <div class="flap"></div>
                <div class="pocket"></div>
                <div class="letter" id="letter">
                    <div class="letter-content" id="letterContent">
                        <h1 class="greeting">My dearest...</h1>
                        <p class="message-text">There's something I've been wanting to tell you for a while now.</p>
                        <p class="message-text">Every moment spent with you has been a beautiful addition to my life.</p>
                        <p class="message-text">I just wanted to let you know...</p>
                        <h2 class="confession">I really like you. ❤️</h2>
                    </div>
                </div>
            </div>
            <div class="instruction" id="instruction">Tap to open</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
